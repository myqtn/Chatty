<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatty</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f2f2f2;
}

/* LOGIN */
#loginBox{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  gap:10px;
}

input{
  padding:12px;
  width:250px;
  font-size:14px;
}

button{
  padding:10px 15px;
  cursor:pointer;
}

/* CHAT */
#chatApp{
  display:none;
}

#chat{
  height:80vh;
  overflow-y:auto;
  background:white;
  padding:10px;
}

.message{
  background:#d1f7c4;
  padding:10px;
  margin:6px 0;
  border-radius:10px;
}

.bottom{
  display:flex;
  padding:10px;
  background:#ddd;
}
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginBox">
  <h2>Chatty Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signUp()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<!-- CHAT APP -->
<div id="chatApp">

  <button onclick="logout()">Logout</button>

  <div id="chat"></div>

  <div class="bottom">
    <input id="message" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

/* YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyD7x2dZPM0t95N0mzuQ_zs-5jn9-2Vdknc",
  authDomain: "test-chat-app-ebf78.firebaseapp.com",
  projectId: "test-chat-app-ebf78",
  storageBucket: "test-chat-app-ebf78.firebasestorage.app",
  messagingSenderId: "521617413564",
  appId: "1:521617413564:web:24a2c28120dd4d7f0947b9",
  measurementId: "G-610Y0KTXNY"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const chat = document.getElementById("chat");

/* AUTH FUNCTIONS */
window.signUp = async function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  await createUserWithEmailAndPassword(auth, email, password);
};

window.login = async function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  await signInWithEmailAndPassword(auth, email, password);
};

window.logout = async function(){
  await signOut(auth);
};

/* AUTH STATE */
onAuthStateChanged(auth, (user) => {

  if(user){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("chatApp").style.display = "block";
    loadMessages();
  } else {
    document.getElementById("loginBox").style.display = "flex";
    document.getElementById("chatApp").style.display = "none";
  }
});

/* CHAT */
window.sendMessage = async function(){

  const input = document.getElementById("message");

  if(input.value.trim() === "") return;

  await addDoc(collection(db, "messages"), {
    text: input.value,
    uid: auth.currentUser.uid,
    time: Date.now()
  });

  input.value = "";
};

function loadMessages(){

  const q = query(collection(db,"messages"), orderBy("time"));

  onSnapshot(q,(snapshot)=>{

    chat.innerHTML = "";

    snapshot.forEach((doc)=>{

      const data = doc.data();

      const div = document.createElement("div");
      div.className = "message";
      div.textContent = data.text;

      chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
  });
}

</script>

</body>
</html>
