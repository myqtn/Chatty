<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Chat</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f2f2f2;
}

#chat{
    height:80vh;
    overflow-y:auto;
    padding:10px;
    background:white;
}

.message{
    background:#d9fdd3;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
}

.bottom{
    display:flex;
    padding:10px;
    background:#ddd;
}

#message{
    flex:1;
    padding:12px;
    font-size:16px;
}

button{
    padding:12px 20px;
    margin-left:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="chat"></div>

<div class="bottom">
<input id="message" placeholder="Type a message...">
<button onclick="sendMessage()">Send</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD7x2dZPM0t95N0mzuQ_zs-5jn9-2Vdknc",
authDomain: "test-chat-app-ebf78.firebaseapp.com",
projectId: "test-chat-app-ebf78",
storageBucket: "test-chat-app-ebf78.firebasestorage.app",
messagingSenderId: "521617413564",
appId: "1:521617413564:web:21616bde9e1302dc0947b9",
measurementId: "G-W8RPS4SJP5"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const chat = document.getElementById("chat");

window.sendMessage = async function(){

const input = document.getElementById("message");

if(input.value.trim()=="") return;

await addDoc(collection(db,"messages"),{
text:input.value,
time:Date.now()
});

input.value="";
};

const q = query(collection(db,"messages"),orderBy("time"));

onSnapshot(q,(snapshot)=>{

chat.innerHTML="";

snapshot.forEach((doc)=>{

const div=document.createElement("div");

div.className="message";

div.textContent=doc.data().text;

chat.appendChild(div);

});

chat.scrollTop=chat.scrollHeight;

});

</script>

</body>
</html>
